<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Log Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #00e676;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .toolbar-left { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #555; display: inline-block;
        }
        .status-dot.live { background: #00e676; box-shadow: 0 0 6px #00e676; }
        .status-text { font-size: 11px; opacity: 0.6; }
        .toolbar-right { display: flex; gap: 6px; }
        .toolbar button {
            padding: 4px 12px; font-size: 11px; font-family: inherit;
            background: #2a2a2a; color: #ccc; border: 1px solid #444;
            border-radius: 4px; cursor: pointer;
        }
        .toolbar button:hover { background: #3a3a3a; }
        #log-terminal {
            flex: 1; padding: 10px 14px; overflow-y: auto;
            word-break: break-all; white-space: pre-wrap;
        }
        .log-line { line-height: 1.5; }
        .log-line.stdout { color: #00e676; }
        .log-line.stderr { color: #ff5252; }
        .log-line.info { color: #64b5f6; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text" class="status-text">Idle</span>
        </div>
        <div class="toolbar-right">
            <button id="clear-btn">Clear</button>
            <button id="copy-btn">Copy All</button>
        </div>
    </div>
    <div id="log-terminal"><span style="opacity:0.4;">Waiting for game launch...</span></div>

    <script>
        const terminal = document.getElementById('log-terminal');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function addLine(line) {
            if (terminal.querySelector('span[style*="opacity"]') && terminal.children.length === 1) {
                terminal.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = 'log-line';
            div.textContent = line;
            if (line.includes('[stderr]')) div.classList.add('stderr');
            else if (line.includes('[info]')) div.classList.add('info');
            else div.classList.add('stdout');
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        window.electron.onLogLine((line) => addLine(line));

        window.electron.onLogStatus((running) => {
            if (running) {
                statusDot.classList.add('live');
                statusText.textContent = 'Live';
            } else {
                statusDot.classList.remove('live');
                statusText.textContent = 'Idle';
            }
        });

        window.electron.onLogInit((lines) => {
            if (lines && lines.length > 0) {
                terminal.innerHTML = '';
                lines.forEach(line => addLine(line));
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            terminal.innerHTML = '<span style="opacity:0.4;">Log cleared.</span>';
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(terminal.innerText);
        });
    </script>
</body>
</html>
